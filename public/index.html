<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatleIO</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
</head>

<header class="main-header">
    
    <div class="header-content">
        <div>
            <h1 class="header-title">ChatleIO</h1>
            <p class="header-subtitle">
                Sistema de comunicação em tempo real
            </p>
        </div>

        <nav class="header-actions">
            <button class="header-btn" id="btnHome">
                Início
            </button>
            <button class="header-btn" id="btnSettings">
                Configurações
            </button>
            <button class="header-btn" id="btnLogout">
                Logout
            </button>
        </nav>
    </div>

</header>

<body>

  <div class="container py-5">

    <div class="chat-card">

      <div class="chat-header d-flex justify-content-between align-items-center">

        <div class="d-flex gap-2">
          <span class="window-button btn-1"></span>
          <span class="window-button btn-2"></span>
          <span class="window-button btn-3"></span>
        </div>

        <h5 class="m-0 fw-bold">
          ChatleIO
        </h5>

      </div> 

      <div id="messageSpace" description="Espaço para as mensagens" class="chat-body">
        <!-- mensagens -->
      </div>

    </div>

    <form id="messageForm" class="row mt-4 g-3">

      <div class="col-9">
        <input
          type="text"
          class="form-control"
          id="messageInput"
          placeholder="Digite sua mensagem..."
          required
        >
      </div>

      <div class="col-3 d-grid">
        <button type="submit" class="send-btn">
          Enviar
        </button>
      </div>

    </form>

</div>

<footer>
  <a>Made by CiringaMen</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script defer src="./app.js"></script>

</body>
</html>
